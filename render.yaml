# Render Blueprint — https://render.com/docs/blueprint-spec
# After connecting this repo, set secrets in the Render dashboard (Environment tab).
services:
  - type: web
    name: expensetracker-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: DNS_SERVERS
        value: 8.8.8.8,8.8.4.4
